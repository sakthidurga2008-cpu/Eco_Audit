services:
  backend:
    image: eco-backend:1.0
    container_name: eco-backend
    environment:
      DATABASE_URL: sqlite:////data/ecoaudit.db
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ecoaudit-data:/data

  frontend:
    image: eco-ui:1.0
    container_name: eco-ui
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ecoaudit-data:
